# Default run config. Runs are config-driven — don't hardcode these in modules.
# Copy per experiment (e.g. configs/qwen9b.yaml) and override.
#
# Resolved decisions (was "pending" — see CLAUDE.md): languages en+ru/es/he,
# Google translation of choices, three eval arms (Qwen-vLLM / XLM-R / ESIM),
# letter answers, deterministic decoding, flip-rate + McNemar analysis.

seed: 42

dataset:
  name: tau/commonsense_qa
  split: validation          # test answer keys are withheld; we score on validation
  # limit: null              # set an int for quick smoke runs

languages:
  source: en
  targets: [ru, es, he]      # Russian, Spanish, Hebrew. English is the baseline.
                             # (Arabic from the initial proposal was dropped.)

conditions:                  # which Q-A variants to build/evaluate
  - en-en                    # baseline: English question, English choices
  - en-x                     # English question, choices in X  (the core probe)
  # - x-x                    # extension: translate the question too (needs flag below)
  # - x-en                   # extension: translated question, English choices

extensions:
  translate_questions: false # set true (and add x-x/x-en above) to translate questions

translation:
  backend: google            # Google Cloud Translation v2 REST (auth: GOOGLE_API_KEY)
  cache: true                # cached under data/translated/_cache/

eval:
  answer_format: letter      # letter-based (A-E) selection — NOT answer text (load-bearing)
  think_modes: [off, on]     # generative arm only; gemma4 has no <think> (on == off)
  decoding:
    temperature: 0           # deterministic; do not change for scored runs
    max_tokens_think_off: 32
    max_tokens_think_on: 8192
  generative:                # zero-shot, vLLM-served on BGU. Mirror cluster/defaults.sh.
    backend: vllm
    models:
      - {tag: "Qwen3.5:0.8B",   hf: "Qwen/Qwen3.5-0.8B"}
      - {tag: "Qwen3.5:4B",     hf: "Qwen/Qwen3.5-4B"}
      - {tag: "Qwen3.5:9B",     hf: "Qwen/Qwen3.5-9B"}
      - {tag: "qwen3.6:35b",    hf: "cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit"}
      - {tag: "gemma4:26b-a4b", hf: "cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit"}
  encoder:                   # fine-tuned multilingual baseline (cross-lingual transfer)
    model: xlm-roberta-base
    ckpt: checkpoints/xlmr-csqa
  anchor:                    # pre-transformer BiLSTM; English-condition only
    model: esim
    ckpt: checkpoints/esim-csqa.pt

paths:
  data_raw: data/raw
  data_translated: data/translated
  data_variants: data/variants
  results: results
